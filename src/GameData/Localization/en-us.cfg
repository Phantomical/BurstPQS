Localization
{
    en-us
    {
        #BurstPQS_UI_BurstError_Title = BurstPQS

        // BurstPQS could not find any burst-compiled methods!
        //
        // This is not a hard error and your game is not broken. It does mean that KSPBurst was unable to successfully build a native binary so some things will be much slower than they were meant to be.
        //
        // For the latest advice on making KSPBurst work check out BurstPQS forum thread.
        #BurstPQS_UI_BurstError_Message = BurstPQS could not find any burst-compiled methods!\n\nThis is not a hard error and your game is not broken. It does mean that KSPBurst was unable to successfully build a native library so some things will be much slower than they were meant to be.\n\nFor the latest advice on making KSPBurst work take a look at the BurstPQS forum thread.
    }
}
