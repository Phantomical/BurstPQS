name: release

on:
  release:
    types: 
      - published

env:
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  build:
    uses: ./.github/workflows/ci.yml

  upload-release-assets:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: BurstPQS
          path: BurstPQS
      - uses: actions/download-artifact@v4
        with:
          name: BurstPQS.version
      - run: tree

      - name: Create Zip
        run: |
          cd BurstPQS
          zip -r9 ../BurstPQS.zip *

      - name: Upload Release Assets
        run: |
          gh release upload --clobber ${{ github.ref_name }}  \
            BurstPQS.zip                  \
            BurstPQS.version
